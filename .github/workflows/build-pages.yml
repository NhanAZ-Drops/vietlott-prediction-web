name: Build and deploy prediction web

on:
  workflow_dispatch:
  schedule:
    - cron: "12,42 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-pages.yml"
      - "src/**"
      - "site/**"
      - "predictions/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prediction-web
  cancel-in-progress: false

jobs:
  build:
    name: Build from canonical data repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout data repo
        uses: actions/checkout@v6
        with:
          repository: NhanAZ-Drops/vietlott-data-research
          ref: main
          path: _data_repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install web builder
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Rebuild site data from collector snapshot
        run: |
          vietlott-research-report \
            --datasets-dir _data_repo/datasets \
            --site-dir site \
            --prediction-ledger predictions/ledger.jsonl

      - name: Test
        run: python -m pytest

      - name: Commit regenerated web data
        shell: bash
        run: |
          git add predictions site/data
          if git diff --cached --quiet; then
            echo "No web data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "web: rebuild from Vietlott data snapshot"
          git push origin HEAD:main

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
